name: Publish to GitHub Packages

on:
  release:
    types: [created]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: Skip tests
        required: false
        default: "true"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17 with GitHub Packages
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: temurin
          server-id: github
          server-username: MAVEN_USERNAME
          server-password: MAVEN_TOKEN

      - name: Publish package
        run: mvn --batch-mode deploy -DskipTests=${{ github.event.inputs.skip_tests || 'true' }}
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_TOKEN: ${{ secrets.GITHUB_TOKEN }}
